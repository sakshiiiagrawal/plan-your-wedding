services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wedding
      POSTGRES_PASSWORD: wedding
      POSTGRES_DB: wedding_planner
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/supabase/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
      - ./api/supabase/migrations/004_users_and_website_content_fix.sql:/docker-entrypoint-initdb.d/004_users_and_website_content_fix.sql
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wedding -d wedding_planner']
      interval: 5s
      timeout: 5s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v12.2.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://wedding:wedding@postgres:5432/wedding_planner
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: wedding
      PGRST_JWT_SECRET: docker-local-jwt-secret-change-in-production
    ports:
      - '3000:3000'

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    ports:
      - '3001:3001'

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:3001
        VITE_SUPABASE_URL: http://localhost:3000
        VITE_SUPABASE_ANON_KEY: docker-local-anon-key
    ports:
      - '5173:80'
    depends_on:
      - api

volumes:
  postgres_data:
